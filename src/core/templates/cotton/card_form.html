<div class="grow flex items-center justify-center">
    <div class="bg-white shadow-lg p-6 rounded-2xl w-full max-w-md">
        <div class="text-center">
            <form method="post" class="space-y-4">
                <legend class="text-2xl font-semibold mb-4 text-gray-800">{{ legend }}</legend>
                {% csrf_token %}
                {{ form.as_p }}
                {{ extra }}
                <div>
                    <button 
                        id="submitButton" 
                        type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700
                        text-white font-medium py-2.5 rounded-lg
                        transition duration-200"
                    >
                        {{ button }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
