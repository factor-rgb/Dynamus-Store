{% load static %}

<footer class="
    bg-[#A6845D] text-[#FAF7F2] text-center
    py-8 text-xl
    md:py-20 md:text-2xl
    lg:py-4 lg:text-xl
    grid grid-cols-1 gap-8
    md:grid-cols-3
    place-items-center
">

    <div class="max-w-sm w-full flex items-center justify-center px-4 lg:px-12">
        <img src="{% static 'core/assets/img/alone_night.png' %}" class="max-h-38 md:max-h-38 lg:max-h-42 object-contain" alt="imagen publicitaria sobre un accesorio para mascotas">
    </div>

    <!-- Copyright de la pagina -->
    <div class="container mx-auto px-4 lg:px-5 max-w-sm w-full space-y-4">
        <p>Copyright &copy; {{ author }} 2024-2026</p>
        <p>Direccion Cede Principal:<br>Gatastro #504-U28</p>
        <p class="space-x-4">
            {% for contact in contacts %}
                <a href="{{ contact.url }}"
                    class="{{ contact.class }}"
                    target="_blank">
                    <i class="{{ contact.icon }}"></i>
                </a>
            {% endfor %}
        </p>
    </div>

    <div class="flex flex-col items-center md:items-end justify-center mt-3 space-y-2 md:space-y-4 md:pr-4 max-w-sm w-full">
        <a
            href="https://wa.me/573001234567"
            target="_blank"
            aria-label="WhatsApp"
            class="
                w-10 h-10 flex items-center justify-center
                rounded-full
                border-2 border-green-400
                text-green-400
                hover:bg-green-500 hover:text-white
                transition-all duration-300
                shadow-sm hover:shadow-md
            "
        >
            <i class="fa-brands fa-whatsapp text-2xl"></i>
        </a>
        <a
            href="tel:573001234567"
            class="
                font-medium text-lg
                tracking-wide
                hover:text-blue-600
                transition-colors
                no-underline
                select-none
            "
        >
            573001234567
        </a>
        
        <a 
            href="mailto:ejemplo@correo.com"
            target="_blank"
            aria-label="Email"
            class="
                w-10 h-10 flex items-center justify-center
                rounded-full
                border-2 border-blue-400
                text-blue-400
                hover:bg-blue-500 hover:text-white
                transition-all duration-300
                shadow-sm hover:shadow-md
            "
        >
            <i class="fa-solid fa-envelope text-2xl"></i>
        </a>

        <a
            href="mailto:ejemplo@correo.com"
            class="
                font-medium text-lg
                tracking-wide
                hover:text-blue-600
                transition-colors
                no-underline
                select-none
            "
        >
            ejemplo@correo.com
        </a>
    </div>
</footer>
