<footer class="py-5 bg-[#050016] text-center text-white text-lg">

    <!-- Copyright de la pagina -->
    <div class="container mx-auto px-4 lg:px-5">
        <p>Copyright &copy; {{ author }}</p>
    </div>

    <!-- Seccion contactos -->
    <div class="flex justify-center mt-3 space-x-4">
        {% for contact in contacts %}
            <a href="{{ contact.url }}"
                class="{{ contact.class }}"
                target="_blank">
                <i class="{{ contact.icon }}"></i>
            </a>
        {% endfor %}
    </div>
</footer>
