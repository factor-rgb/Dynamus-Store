{% load static %}

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="an example web page about buy and sell stuff" />
        <meta name="author" content="RGB Productions" />
        <title>
            {% block title %}
                Dynamus Store
            {% endblock title %}
        </title>
        <link rel="icon" type="image/x-icon" href="{% static 'core/assets/favicon.ico' %}" />
        <!-- Font icons-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{% static 'core/css/styles.css' %}" rel="stylesheet" />
    </head>
    <body {%block body_pd %}id="page-top"{% endblock body_pd %}>
        {% block navbar %}
            {% include 'core/complements/navbar.html' %}
        {% endblock navbar %}

        {% block content %}
        {% endblock content %}

        {% block footer %}
            {% include 'core/complements/footer.html' %}
        {% endblock footer %}

        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->
        <!-- Core theme JS-->
        <script src="{% static 'core/js/scripts.js' %}"></script>
        <!--                               SB Forms JS                               -->
        <!--  Activate your form at https://startbootstrap.com/solution/contact-forms -->
        <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
        <!-- htmx sript -->
        <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
        <!-- youtube frame -->
        <script>
            // Cuando HTMX termina de insertar el modal
            document.body.addEventListener('htmx:afterSwap', function(evt) {
                if (evt.detail.target.id === "modal-container") {
                var modalEl = document.getElementById('videoModal');
                var iframe = modalEl.querySelector('#youtubeIframe');
                var embedSrc = iframe.getAttribute('data-src');

                // Instancia modal
                var bsModal = new bootstrap.Modal(modalEl);
                bsModal.show();

                // Asigna src al abrir
                modalEl.addEventListener('show.bs.modal', function () {
                    iframe.src = embedSrc;
                });

                // Al cerrar: limpiar src y backdrop
                modalEl.addEventListener('hidden.bs.modal', function () {
                    iframe.src = '';

                    // Eliminar backdrop manualmente
                    var backdrops = document.querySelectorAll('.modal-backdrop');
                    backdrops.forEach(function(bd) {
                    bd.parentNode.removeChild(bd);
                    });

                    // Opcional: limpiar el contenedor del modal para evitar duplicados
                    document.getElementById("modal-container").innerHTML = "";
                });
                }
            });
        </script>
    </body>
</html>
