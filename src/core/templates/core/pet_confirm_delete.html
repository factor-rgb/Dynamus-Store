<div 
  id="modal"
  class="fixed inset-0 z-50 flex items-center justify-center"
  hx-target="this"
  hx-swap="outerHTML"
>
    <!-- BACKDROP -->
    <div id="modal-backdrop" class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>

    <div
        id="modal-panel"
        class="relative z-10 bg-white border-2 border-amber-500 rounded-2xl text-center 
            shadow-xl w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto animate-fadeInScale"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
    >
        <!-- title -->
        <h1 id="modal-title" class="text-xl font-semibold pt-4">
            ¿Eliminar Registro de {{ object.name|capfirst }}?
        </h1>

        <!-- content -->
        <p class="py-5 font-medium">
            Esta acción no se puede deshacer.
        </p>

        <!-- buttoms -->
        <div class="flex items-center justify-center p-4">
            <form method="post" class="flex gap-4" action="{% url 'core:delete' object.pk %}">
                {% csrf_token %}
                <button
                    type="submit"
                    class="inline-flex items-center px-3 py-2 border bg-red-600 hover:bg-red-700
                        text-white font-medium rounded-lg
                        transition duration-200 justify-center"
                >
                    Eliminar
                </button>

                <button 
                    type="button"
                    class="inline-flex items-center px-3 py-2 border bg-[#D98C5F] hover:bg-[#B97249]
                        text-white font-medium rounded-lg
                        transition duration-200 justify-center"
                    onclick="closeModal()"
                >
                    Cancelar
                </button>
            </form>
        </div>
    </div>
</div>
