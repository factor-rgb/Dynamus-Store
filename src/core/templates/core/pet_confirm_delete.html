<div 
  id="modal"
  class="fixed inset-0 z-50 flex items-center justify-center"
  hx-target="this"
  hx-swap="outerHTML"
>
  <!-- BACKDROP -->
  <div id="modal-backdrop" class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>

  <div
    id="modal-panel"
    class="relative z-10 bg-white rounded-2xl text-center shadow-xl w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto animate-fadeInScale"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
      <!-- title -->
      <h1 id="modal-title" class="text-xl font-semibold text-gray-800 pt-4">¿Eliminar {{ object.name }}?</h1>

      <!-- content -->
      <p class="py-5 text-gray-700">
          Esta acción no se puede deshacer.
      </p>

      <!-- buttoms -->
      <div class="flex items-center justify-center p-4">
          <form method="post" class="flex gap-4" action="{% url 'core:delete' object.pk %}">
              {% csrf_token %}
              <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded">Sí, Eliminar</button>
              <button 
                  type="button"
                  class="font-semibold px-4 py-2 border-2 border-gray-400 rounded"
                  onclick="closeModal()"
              >
              Cancelar
              </button>
          </form>
      </div>
  </div>
</div>
