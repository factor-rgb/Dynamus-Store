{% extends 'core/base.html' %}

{% block content %}
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" id="form-container">
        <div class="card shadow-lg p-3 rounded-4 form-card">
            <div class="card-body text-center">
                <form method="post">
                    <legend class="mb-4">Crea tu Cuenta</legend>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <p class="mt-3" id="term-cond">
                        <input  type="checkbox" required>
                        Aceptar
                        <a hx-get="{% url 'core:terms_conditions' %}" hx-target="#term-cond-box" hx-trigger="click">Terminos</a>
                        y Condiciones
                        <div id="term-cond-box"></div>
                    </p>
                    <div class="d-grid mt-3">
                        <button class="btn btn-primary btn-lg" id="submitButton" type="submit">Crear Cuenta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
